# CI/CD para todo el sistema de Reserva Inteligente usando GitHub Actions.
# Este workflow automatiza pruebas, cobertura, construcción de imágenes Docker
# y publicación de imágenes en GitHub Container Registry.

# name = Nombre visible del workflow en la pestaña Actions de GitHub.
name: CI/CD Reserva Inteligente

# on = Define cuándo se ejecuta el pipeline.
# push = Se ejecuta cuando se hace push a main o master.
# pull_request = Se ejecuta cuando se abre o actualiza un pull request hacia main o master.
on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

# env = Variables globales disponibles para todos los jobs.
# Registry es donde se publican las imágenes Docker. En este caso GitHub Container Registry.
# MAIN_API_IMAGE = Nombre base de la imagen Docker del microservicio principal.
# SEARCH_SERVICE_IMAGE = Nombre base de la imagen Docker del microservicio de búsqueda.
#
# Variables de Cognito:
# Se usan valores fake para que los tests puedan inicializar CognitoClient sin conectarse a AWS real.
# Los tests de Cognito usan mocks, por lo que no se exponen credenciales reales.
#
# DATABASE_TYPE = Define el motor por defecto para los tests. prueba
env:
  REGISTRY: ghcr.io
  MAIN_API_IMAGE: ${{ github.repository }}-main-api
  SEARCH_SERVICE_IMAGE: ${{ github.repository }}-search-service

  AWS_REGION: us-east-1
  AWS_COGNITO_REGION: us-east-1
  COGNITO_USER_POOL_ID: fake-pool
  AWS_COGNITO_USER_POOL_ID: fake-pool
  COGNITO_CLIENT_ID: fake-client
  AWS_COGNITO_CLIENT_ID: fake-client
  COGNITO_CLIENT_SECRET: fake-secret
  AWS_COGNITO_CLIENT_SECRET: fake-secret
  DATABASE_TYPE: postgresql

# jobs = Conjunto de tareas que ejecuta el workflow.
jobs:

  # Job de pruebas.
  # Ejecuta pruebas unitarias, pruebas de integración y reportes de cobertura.
  # Si este job falla, no se construyen ni publican imágenes Docker.
  tests:
    name: Unit and Integration Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      # Descarga el código del repositorio dentro del runner de GitHub Actions.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instala Python 3.11 para correr FastAPI, pytest y las dependencias del proyecto.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instala dependencias del api
      # Incluye FastAPI, pytest, pytest-cov, boto3, redis, pymongo, elasticsearch
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      # Ejecuta únicamente pruebas unitarias.
      # Este coverage se enfoca en la lógica crítica del sistema:
      # services, schemas y models.
      - name: Run unit tests with unit coverage
        run: |
          pytest \
            --cov=app.services \
            --cov=app.schemas \
            --cov=app.models \
            --cov-report=term-missing \
            tests/unit

      # Ejecuta pruebas de integración.
      # Estas pruebas validan flujos entre componentes usando mocks cuando corresponde:
      # Redis, búsqueda, daos, mongoDB DAO, cognito, endpoints api y nginx.
      #
      # Nota:
      # Los tests de Nginx se saltan automáticamente esto mejor probarlo local.
      # La validación real de Nginx se realiza localmente en Kubernetes.
      - name: Run integration tests with integration coverage
        run: |
          pytest \
            --cov=app.routes \
            --cov=app.dao \
            --cov=app.auth \
            --cov=search_service.app \
            --cov-report=term-missing \
            tests/integration/test_redis.py \
            tests/integration/test_search_endpoints.py \
            tests/integration/test_nginx.py \
            tests/integration/test_mongodb.py \
            tests/integration/test_flows.py \
            tests/integration/test_daos.py \
            tests/integration/test_auth_cognito.py \
            tests/integration/test_api_endpoints.py

      # Ejecuta una medición global de coverage.
      # Este reporte incluye unitarios + integración sobre las capas principales.
      # son el foco del coverage unitario, como DAOs completos y rutas completas.
      - name: Run global coverage report
        run: |
          pytest \
            --cov=app.services \
            --cov=app.schemas \
            --cov=app.models \
            --cov=app.routes \
            --cov=app.dao \
            --cov=app.auth \
            --cov=search_service.app \
            --cov-report=term-missing \
            tests/unit \
            tests/integration/test_redis.py \
            tests/integration/test_search_endpoints.py \
            tests/integration/test_nginx.py \
            tests/integration/test_mongodb.py \
            tests/integration/test_flows.py \
            tests/integration/test_daos.py \
            tests/integration/test_auth_cognito.py 

  # Job de construcción y publicación de imágenes Docker.
  # Solo se ejecuta si el job tests pasa correctamente.
  build-and-publish-images:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest

    # needs = Este job depende del job tests.
    # Si las pruebas fallan, no se construyen ni publican imágenes.
    needs: tests

    # Permisos necesarios:
    # contents: read = leer el código del repositorio.
    # packages: write = publicar imágenes en GitHub Container Registry.
    permissions:
      contents: read
      packages: write

    steps:
      # Descarga el código del repositorio.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Convierte el nombre del repositorio a minúsculas.
      # GHCR requiere nombres de imágenes en lowercase.
      - name: Convert repository name to lowercase
        run: |
          echo "MAIN_API_IMAGE_LC=$(echo '${{ env.MAIN_API_IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SEARCH_SERVICE_IMAGE_LC=$(echo '${{ env.SEARCH_SERVICE_IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Hace login en Ghcr
      # Solo se ejecuta en push, no en pull_request.
      # Usa github token generado automáticamente por GitHub.
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Construye la imagen docker del api principal usando el Dockerfile de la raíz.
      # Se crean dos tags:
      # - github.sha = versión exacta del commit
      # - latest = última versión disponible
      - name: Build main API Docker image
        run: |
          docker build \
            -t $REGISTRY/$MAIN_API_IMAGE_LC:${{ github.sha }} \
            -t $REGISTRY/$MAIN_API_IMAGE_LC:latest \
            -f Dockerfile .

      # Publica la imagen del API principal en GHCR.
      # Solo se publica cuando hay push.
      - name: Push main API Docker image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$MAIN_API_IMAGE_LC:${{ github.sha }}
          docker push $REGISTRY/$MAIN_API_IMAGE_LC:latest

      # Construye la imagen Docker del microservicio de búsqueda.
      # Usa search_service/Dockerfile.
      - name: Build search service Docker image
        run: |
          docker build \
            -t $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:${{ github.sha }} \
            -t $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:latest \
            -f search_service/Dockerfile .

      # Publica la imagen del search-service en GHCR.
      # Solo se publica cuando hay push.
      - name: Push search service Docker image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:${{ github.sha }}
          docker push $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:latest