name: CI/CD Reserva Inteligente

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  MAIN_API_IMAGE: ${{ github.repository }}-main-api
  SEARCH_SERVICE_IMAGE: ${{ github.repository }}-search-service

  AWS_REGION: us-east-1
  AWS_COGNITO_REGION: us-east-1
  COGNITO_USER_POOL_ID: fake-pool
  AWS_COGNITO_USER_POOL_ID: fake-pool
  COGNITO_CLIENT_ID: fake-client
  AWS_COGNITO_CLIENT_ID: fake-client
  DATABASE_TYPE: postgresql

jobs:

  tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest \
            --cov=app.services \
            --cov=app.schemas \
            --cov=app.models \
            --cov-report=term-missing \
            tests/unit \
            tests/integration/test_redis.py

  build-and-publish-images:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest

    needs: tests

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        run: |
          echo "MAIN_API_IMAGE_LC=$(echo '${{ env.MAIN_API_IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SEARCH_SERVICE_IMAGE_LC=$(echo '${{ env.SEARCH_SERVICE_IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build main API Docker image
        run: |
          docker build \
            -t $REGISTRY/$MAIN_API_IMAGE_LC:${{ github.sha }} \
            -t $REGISTRY/$MAIN_API_IMAGE_LC:latest \
            -f Dockerfile .

      - name: Push main API Docker image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$MAIN_API_IMAGE_LC:${{ github.sha }}
          docker push $REGISTRY/$MAIN_API_IMAGE_LC:latest

      - name: Build search service Docker image
        run: |
          docker build \
            -t $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:${{ github.sha }} \
            -t $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:latest \
            -f search_service/Dockerfile .

      - name: Push search service Docker image
        if: github.event_name == 'push'
        run: |
          docker push $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:${{ github.sha }}
          docker push $REGISTRY/$SEARCH_SERVICE_IMAGE_LC:latest