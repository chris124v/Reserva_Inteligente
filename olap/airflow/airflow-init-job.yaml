apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: reservainteligente
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: airflow-init
          image: ghcr.io/chris124v/reserva_inteligente-airflow:latest
          imagePullPolicy: Never
          command:
            - /bin/bash
            - -c
            - |
              airflow db migrate && \
              airflow users create \
                --username admin \
                --password admin \
                --firstname Admin \
                --lastname Admin \
                --role Admin \
                --email admin@reservainteligente.local || true
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"