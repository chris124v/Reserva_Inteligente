# Plantilla del Secret de Airflow. Copiar a airflow-secret.yaml (gitignored) y
# rellenar con valores reales antes de desplegar.
#   FERNET_KEY        -> python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   WEBSERVER_SECRET  -> python -c "import secrets; print(secrets.token_hex(32))"
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
  namespace: reservainteligente
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:CAMBIAR_PASS@airflow-postgres:5432/airflow"
  AIRFLOW__CORE__FERNET_KEY: "GENERAR_FERNET_KEY"
  AIRFLOW__WEBSERVER__SECRET_KEY: "GENERAR_WEBSERVER_SECRET_KEY"

  # Connection hacia PostgreSQL operacional (extraccion del DAG), lleva password
  AIRFLOW_CONN_POSTGRES_OPERACIONAL: "postgresql://postgres:CAMBIAR_PASS@postgres-service:5432/restaurantes_db"

  # Usuario admin que crea airflow-init-job la primera vez
  AIRFLOW_ADMIN_USERNAME: "admin"
  AIRFLOW_ADMIN_PASSWORD: "CAMBIAR_ADMIN_PASS"
