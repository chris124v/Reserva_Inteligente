# Deployment del Airflow Scheduler.
# Con LocalExecutor, este mismo pod ejecuta las tareas como subprocesos -
# incluye spark-submit local[*], que levanta una JVM propia. Por eso los
# recursos son mas altos que los de un servicio liviano como main-api.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: reservainteligente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: airflow-scheduler
          image: ghcr.io/chris124v/reserva_inteligente-airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          resources:
            requests:
              memory: "1Gi"
              cpu: "300m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
