# Deployment del Airflow Webserver (UI), puerto 8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: reservainteligente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: ghcr.io/chris124v/reserva_inteligente-airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
