# Deployment del Airflow Webserver (UI), puerto 8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: reservainteligente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: ghcr.io/chris124v/reserva_inteligente-airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secret
          # Tuning para nodo con poca RAM: 1 solo worker gunicorn, sin el refresh
          # periodico que recicla workers (causa "Parent changed, shutting down" y
          # mata el webserver), y timeout amplio para arranques lentos.
          env:
            - name: AIRFLOW__WEBSERVER__WORKERS
              value: "1"
            - name: AIRFLOW__WEBSERVER__WORKER_REFRESH_BATCH_SIZE
              value: "0"
            - name: AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL
              value: "0"
            - name: AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT
              value: "300"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
