# Credenciales y claves internas de Airflow.
# FERNET_KEY cifra passwords de Connections guardadas en la BD de metadatos.
# WEBSERVER_SECRET_KEY firma las cookies de sesion de la UI.
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
  namespace: reservainteligente
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow"
  AIRFLOW__CORE__FERNET_KEY: "XjiwJiZVoNBGa7DXdhxKvEIdJJcZGG2zvbLIxYMUDsg="
  AIRFLOW__WEBSERVER__SECRET_KEY: "297d3703147820db8bdd36c9926fc2e1bc94a35f291dd955f6dc870606c69214"

  # Connection hacia PostgreSQL operacional (extraccion del DAG), lleva password
  AIRFLOW_CONN_POSTGRES_OPERACIONAL: "postgresql://postgres:MySecurePass123!@postgres-service:5432/restaurantes_db"

  # Usuario admin que crea airflow-init-job la primera vez
  AIRFLOW_ADMIN_USERNAME: "admin"
  AIRFLOW_ADMIN_PASSWORD: "ReservaAdmin2026!"
