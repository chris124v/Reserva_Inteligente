# Deployment de HiveServer2
# Acepta conexiones JDBC/ODBC (puerto 10000) y ejecuta queries HiveQL
# Se conecta al Metastore via Thrift (9083) y a HDFS para leer/escribir datos
# La config se monta desde el ConfigMap hive-config en /opt/hive/conf/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiveserver2
  namespace: reservainteligente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hiveserver2
  template:
    metadata:
      labels:
        app: hiveserver2
    spec:
      containers:
        - name: hiveserver2
          image: bde2020/hive:2.3.2-postgresql-metastore
          command:
            - /bin/bash
            - -c
            - /opt/hive/bin/hive --service hiveserver2
          ports:
            - containerPort: 10000
              name: jdbc
            - containerPort: 10002
              name: webui
          volumeMounts:
            - name: hive-conf
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hive-conf
              mountPath: /opt/hive/conf/core-site.xml
              subPath: core-site.xml
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: hive-conf
          configMap:
            name: hive-config
