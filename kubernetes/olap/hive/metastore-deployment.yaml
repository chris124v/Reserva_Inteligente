# Deployment del Hive Metastore
# El Metastore guarda los metadatos de tablas, columnas, particiones y schemas de Hive
# en PostgreSQL y los expone via Thrift (puerto 9083) para que HiveServer2 los consulte
#
# initContainer: espera que PostgreSQL esté listo e inicializa el schema de metastore
# La config se monta desde el ConfigMap hive-config en /opt/hive/conf/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: reservainteligente
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      initContainers:
        - name: init-schema
          image: bde2020/hive:2.3.2-postgresql-metastore
          command:
            - /bin/bash
            - -c
            - |
              echo "Verificando schema del Metastore..."
              if /opt/hive/bin/schematool -dbType postgres -info 2>/dev/null; then
                echo "Schema ya existe, continuo."
              else
                echo "Schema no existe, inicializando..."
                /opt/hive/bin/schematool -dbType postgres -initSchema
                echo "Schema inicializado correctamente."
              fi
          volumeMounts:
            - name: hive-conf
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hive-conf
              mountPath: /opt/hive/conf/core-site.xml
              subPath: core-site.xml
      containers:
        - name: hive-metastore
          image: bde2020/hive:2.3.2-postgresql-metastore
          command:
            - /bin/bash
            - -c
            - /opt/hive/bin/hive --service metastore
          ports:
            - containerPort: 9083
              name: thrift
          volumeMounts:
            - name: hive-conf
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hive-conf
              mountPath: /opt/hive/conf/core-site.xml
              subPath: core-site.xml
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: hive-conf
          configMap:
            name: hive-config
