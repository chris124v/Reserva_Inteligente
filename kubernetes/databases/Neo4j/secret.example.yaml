# Plantilla del Secret de Neo4J. Copiar a secret.yaml (gitignored) y rellenar.
#   NEO4J_AUTH: formato "usuario/password" que espera la imagen oficial de Neo4J.
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: reservainteligente
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/TU_NEO4J_PASSWORD"
