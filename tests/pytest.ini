[pytest]
# Configuración de pytest para tests/ (raíz de tests)

# Directorios y patrones de prueba
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de ejecución
addopts = 
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# Markers personalizados
markers =
    unit: Tests unitarios (rápidos, sin dependencias externas)
    integration: Tests de integración (flujos completos)
    slow: Tests que son lentos
    cache: Tests que prueban caché
    search: Tests que prueban búsqueda/Elasticsearch
    smoke: Tests críticos (smoke tests)
    flaky: Tests que pueden fallar ocasionalmente

# Opciones de cobertura
[coverage:run]
source = app
omit = 
    */tests/*
    */venv/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Asyncio
asyncio_mode = auto

# Timeouts (para evitar tests colgados)
timeout = 300

# Timeout para tests lentos
slow_timeout = 600
